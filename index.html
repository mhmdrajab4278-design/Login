<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <form action="#">
        <div class="card">
        

            <h1>Login</h1>
            <div class="inputs">
                <div><input type="text" placeholder="Username" required></div>
                <i class="fa-solid fa-user"></i>
            </div>

            <div class="inputs">
                <div><input type="password" placeholder="Password" required></div>
                <i class="fa-solid fa-lock"></i>
            </div>

            <div class="remember-forgot"><label><input type="checkbox">Remember Me ?</label> <a href="#">Forgot Password ?</a></div>
        
            <div class="btn"><button>Login</button></div>
            <div class="last">
                <label class="re-label">Don`t have an account?</label>
                <a class="Register" href="#">Register.</a>
            </div>
        

        </div>
    </form>
</body>
</html>
